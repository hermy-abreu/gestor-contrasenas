<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>Generador de Contraseñas</h1>
            <p>Crea contraseñas seguras y aleatorias</p>
        </header>

        <section class="result-container">
            <div class="password-display">
                <input type="password" id="password-result" class="password-result" readonly placeholder="Tu contraseña aquí" aria-label="Contraseña generada">
                <div class="result-actions">
                    <button type="button" id="toggle-visibility" class="icon-btn" aria-label="Mostrar u ocultar contraseña" title="Mostrar/Ocultar">
                        <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg id="icon-eye-off" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                    <button type="button" id="copy-btn" class="icon-btn" aria-label="Copiar al portapapeles" title="Copiar">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
            <!-- Feedback visual en DOM en lugar de alert() -->
            <div id="copy-feedback" class="feedback-message" aria-live="polite">¡Copiado al portapapeles!</div>
        </section>

        <section class="controls-container">
            <div class="control-group length-group">
                <div class="length-header">
                    <label for="password-length">Longitud de la contraseña</label>
                    <span id="length-value" class="length-value">12</span>
                </div>
                <input type="range" id="password-length" min="4" max="32" value="12" class="slider" aria-label="Configurar longitud">
            </div>

            <fieldset class="control-group settings-group">
                <legend class="sr-only">Ajustes de caracteres</legend>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="include-uppercase" checked>
                    <span class="checkmark"></span>
                    Incluir Mayúsculas
                </label>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="include-lowercase" checked>
                    <span class="checkmark"></span>
                    Incluir Minúsculas
                </label>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="include-numbers" checked>
                    <span class="checkmark"></span>
                    Incluir Números
                </label>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="include-symbols" checked>
                    <span class="checkmark"></span>
                    Incluir Símbolos
                </label>
            </fieldset>

            <div class="control-group strength-group">
                <div class="strength-header">
                    <span class="strength-label">Fortaleza</span>
                    <span id="strength-text" class="strength-text">Media</span>
                </div>
                <div class="strength-bars">
                    <div class="bar" data-level="1"></div>
                    <div class="bar" data-level="2"></div>
                    <div class="bar" data-level="3"></div>
                    <div class="bar" data-level="4"></div>
                </div>
            </div>

            <button type="button" id="generate-btn" class="generate-btn">
                Generar Contraseña
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </button>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
